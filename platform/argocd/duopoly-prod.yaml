apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: duopoly-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/duopoly/platform
    targetRevision: main
    path: platform/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: duopoly-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Validate=true

