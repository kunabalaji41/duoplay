apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: duopoly-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/duopoly/llm-gateway:latest
          env:
            - name: LOG_LEVEL
              value: info
            - name: MAX_RETRIES
              value: "3"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 2

