name: deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests
        run: python -m unittest discover -s duopoly/tests -v

  deploy-prod:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifests
        run: kubectl apply --dry-run=server -f duopoly/platform/kubernetes
      - name: Deploy
        run: kubectl apply -f duopoly/platform/kubernetes

